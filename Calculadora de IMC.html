<!DOCTYPE html>
<html>
<head>
    <title>Calculadora de IMC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="container">
    <h2>Calculadora de IMC</h2>
    <form>
        <div class="mb-3 col-sm-4">
            <label for="Peso" class="form-label">Peso</label>
            <input type="number" id="Peso" class="form-control">
        </div>
        <div class="mb-3 col-sm-4">
            <label for="Altura" class="form-label">Altura</label>
            <input type="number" id="Altura" class="form-control">
        </div>
		<div class="row">
		<div class="mb-3 col-sm-2">
        <a href="imc.js" onclick="calcular()" class="btn btn-primary">Calcular IMC</a>
		</div>
		<div class="mb-3 col-sm-2">
        <button type="reset" class="btn btn-primary">limpar</button>
		</div>		
		</div>
        <div class="mb-3 col-sm-4">
            <p class="alert alert-primary">Resultado IMC</p>
        </div>
</body>
</html>
